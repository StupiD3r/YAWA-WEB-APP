services:
  # ------------------------------------------------------------------
  # Config Server (Stores metadata about shard locations)
  # ------------------------------------------------------------------
  configsvr:
    image: mongo:6.0
    container_name: mongo-configsvr
    command: mongod --configsvr --replSet configReplSet --port 27019 --bind_ip_all
    ports:
      - "27019:27019"
    volumes:
      - config_data:/data/db

  # ------------------------------------------------------------------
  # Shard 1 (Replica Set 1)
  # ------------------------------------------------------------------
  shard1a:
    image: mongo:6.0
    container_name: mongo-shard1a
    command: mongod --shardsvr --replSet shard1ReplSet --port 27018 --bind_ip_all
    ports:
      - "27018:27018"
    volumes:
      - shard1a_data:/data/db

  # ------------------------------------------------------------------
  # Shard 2 (Replica Set 2)
  # ------------------------------------------------------------------
  shard2a:
    image: mongo:6.0
    container_name: mongo-shard2a
    command: mongod --shardsvr --replSet shard2ReplSet --port 27017 --bind_ip_all
    ports:
      - "27017:27017"
    volumes:
      - shard2a_data:/data/db

  # ------------------------------------------------------------------
  # Mongos Router (The entry point for your MERN App)
  # ------------------------------------------------------------------
  mongos:
    image: mongo:6.0
    container_name: mongo-router
    command: mongos --configdb configReplSet/configsvr:27019 --bind_ip_all --port 27016
    ports:
      - "27016:27016"
    depends_on:
      - configsvr
      - shard1a
      - shard2a

  # ------------------------------------------------------------------
  # Redis Cache Server (New Distributed Caching Layer)
  # ------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_cache_data:/data

  # ------------------------------------------------------------------
  # Zookeeper (Coordinates Kafka Broker State)
  # ------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: kafka-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # ------------------------------------------------------------------
  # Apache Kafka Broker (High-Throughput Distributed Event Stream)
  # ------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka-broker
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

volumes:
  config_data:
  shard1a_data:
  shard2a_data:
  redis_cache_data: