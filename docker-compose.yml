services:
  # ------------------------------------------------------------------
  # Config Server (Stores metadata about shard locations)
  # ------------------------------------------------------------------
  configsvr:
    image: mongo:6.0
    container_name: mongo-configsvr
    command: mongod --configsvr --replSet configReplSet --port 27019 --bind_ip_all
    ports:
      - "27019:27019"
    volumes:
      - config_data:/data/db

  # ------------------------------------------------------------------
  # Shard 1 (Replica Set 1)
  # ------------------------------------------------------------------
  shard1a:
    image: mongo:6.0
    container_name: mongo-shard1a
    command: mongod --shardsvr --replSet shard1ReplSet --port 27018 --bind_ip_all
    ports:
      - "27018:27018"
    volumes:
      - shard1a_data:/data/db

  # ------------------------------------------------------------------
  # Shard 2 (Replica Set 2)
  # ------------------------------------------------------------------
  shard2a:
    image: mongo:6.0
    container_name: mongo-shard2a
    command: mongod --shardsvr --replSet shard2ReplSet --port 27017 --bind_ip_all
    ports:
      - "27017:27017"
    volumes:
      - shard2a_data:/data/db

  # ------------------------------------------------------------------
  # Mongos Router (The entry point for your MERN App)
  # ------------------------------------------------------------------
  mongos:
    image: mongo:6.0
    container_name: mongo-router
    command: mongos --configdb configReplSet/configsvr:27019 --bind_ip_all --port 27016
    ports:
      - "27016:27016"
    depends_on:
      - configsvr
      - shard1a
      - shard2a

  # ------------------------------------------------------------------
  # Redis Cache Server (New Distributed Caching Layer)
  # ------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_cache_data:/data

volumes:
  config_data:
  shard1a_data:
  shard2a_data:
  redis_cache_data: # Keeps your cache data persistence isolated